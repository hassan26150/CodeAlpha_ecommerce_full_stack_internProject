<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> ShopLogo
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="cart.html" class="nav-link active">
                    <i class="fas fa-shopping-cart"></i> Cart
                    <span id="cart-badge" class="badge badge-primary" style="display: none;">0</span>
                </a>
            </div>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container" style="padding: 3rem 1.5rem;">
        <h1 style="margin-bottom: 2rem;">Shopping Cart</h1>

        <div class="cart-layout" id="cart-content" style="display: none;">
            <!-- Cart Items -->
            <div class="card">
                <div id="cart-items-container">
                    <!-- Items injected here -->
                </div>
            </div>

            <!-- Cart Summary -->
            <div>
                <div class="card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200);">Order Summary</h3>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="color: var(--gray-600);">Items (<span id="summary-qty">0</span>)</span>
                        <span style="font-weight: 600;" id="summary-price">$0.00</span>
                    </div>

                    <a href="checkout.html" class="btn btn-primary btn-block">Proceed To Checkout</a>
                </div>
            </div>
        </div>

        <div id="empty-cart-msg" style="text-align: center; padding: 4rem; display: none;">
            <i class="fas fa-shopping-cart" style="font-size: 4rem; color: var(--gray-300); margin-bottom: 1rem;"></i>
            <h3>Your cart is empty</h3>
            <p style="color: var(--gray-600); margin-bottom: 2rem;">Looks like you haven't added any items to your cart yet.</p>
            <a href="products.html" class="btn btn-primary">Start Shopping</a>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AuthManager.updateNavLinks();
            renderCart();
        });

        function renderCart() {
            const cart = CartManager.getCart();
            CartManager.updateCartBadge();

            const cartContent = document.getElementById('cart-content');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const itemsContainer = document.getElementById('cart-items-container');

            if (cart.length === 0) {
                cartContent.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            cartContent.style.display = 'grid';
            emptyMsg.style.display = 'none';

            let itemsHtml = '';
            let totalQty = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalQty += item.qty;
                totalPrice += item.price * item.qty;

                itemsHtml += `
                    <div class="cart-item">
                        <img src="http://localhost:5000${item.image}" alt="${item.name}">
                        <div style="flex: 1;">
                            <h4 style="margin-bottom: 0.25rem;"><a href="product-details.html#id=${item.product}">${item.name}</a></h4>
                            <div style="color: var(--primary); font-weight: 600;">$${item.price.toFixed(2)}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <select class="form-control" style="width: 70px; padding: 0.5rem;" onchange="updateQty('${item.product}', this.value)">
                                ${[...Array(10).keys()].map(x => 
                                    `<option value="${x + 1}" ${item.qty === x + 1 ? 'selected' : ''}>${x + 1}</option>`
                                ).join('')}
                            </select>
                            <button onclick="removeFromCart('${item.product}')" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            itemsContainer.innerHTML = itemsHtml;
            document.getElementById('summary-qty').textContent = totalQty;
            document.getElementById('summary-price').textContent = `$${totalPrice.toFixed(2)}`;
        }

        function updateQty(id, qty) {
            const cart = CartManager.getCart();
            const item = cart.find(x => x.product === id);
            if (item) {
                CartManager.addToCart(item, parseInt(qty)); // addToCart handles updates too
                renderCart();
            }
        }

        function removeFromCart(id) {
            CartManager.removeFromCart(id);
            renderCart();
            showToast('Item removed from cart');
        }
    </script>
</body>
</html>
