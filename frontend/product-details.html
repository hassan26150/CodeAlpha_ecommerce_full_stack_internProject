<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> ShopLogo
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link active">Products</a>
                <a href="cart.html" class="nav-link">
                    <i class="fas fa-shopping-cart"></i> Cart
                    <span id="cart-badge" class="badge badge-primary" style="display: none;">0</span>
                </a>
            </div>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container" style="padding: 3rem 1.5rem;">
        <div id="loader" class="loader"></div>
        
        <div id="product-container" style="display: none;">
            <a href="products.html" class="btn btn-outline" style="margin-bottom: 2rem;"><i class="fas fa-arrow-left"></i> Back to Products</a>
            
            <div class="grid grid-cols-2" style="align-items: start;">
                <!-- Product Image -->
                <div class="card" style="padding: 2rem; background-color: var(--gray-100);">
                    <img id="product-image" src="" alt="Product" style="width: 100%; border-radius: var(--radius-md);">
                </div>

                <!-- Product Info -->
                <div>
                    <div id="product-brand" class="badge badge-primary" style="margin-bottom: 1rem; display: inline-block;"></div>
                    <h1 id="product-name" style="font-size: 2.5rem; margin-bottom: 1rem;"></h1>
                    
                    <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem;">
                        <span id="product-rating" style="color: var(--warning);"><i class="fas fa-star"></i> </span>
                        <span id="product-reviews" style="color: var(--gray-600);"></span>
                    </div>

                    <div id="product-price" style="font-size: 2rem; font-weight: 700; color: var(--dark); margin-bottom: 1.5rem;"></div>
                    
                    <p id="product-description" style="color: var(--gray-600); margin-bottom: 2rem; line-height: 1.8;"></p>

                    <div class="card" style="padding: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200);">
                            <span style="font-weight: 600;">Status:</span>
                            <span id="product-stock" style="font-weight: 600;"></span>
                        </div>
                        
                        <div id="qty-container" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; display: none;">
                            <label style="font-weight: 600;">Quantity:</label>
                            <select id="product-qty" class="form-control" style="width: auto;"></select>
                        </div>

                        <button id="add-to-cart-btn" class="btn btn-primary btn-block btn-lg" disabled>
                            Add To Cart <i class="fas fa-shopping-cart"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', async () => {
            AuthManager.updateNavLinks();
            CartManager.updateCartBadge();

            const urlParams = new URLSearchParams(window.location.search);
            let productId = urlParams.get('id');

            if (!productId && window.location.hash.startsWith('#id=')) {
                productId = window.location.hash.substring(4);
            }

            if (!productId) {
                window.location.href = 'products.html';
                return;
            }

            try {
                const product = await ApiService.getProduct(productId);
                currentProduct = product;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('product-container').style.display = 'block';

                document.getElementById('product-image').src = `http://localhost:5000${product.imageUrl}`;
                document.getElementById('product-brand').textContent = product.brand;
                document.getElementById('product-name').textContent = product.name;
                document.getElementById('product-rating').innerHTML = `<i class="fas fa-star"></i> ${product.rating}`;
                document.getElementById('product-reviews').textContent = `${product.numReviews} Reviews`;
                document.getElementById('product-price').textContent = `$${product.price.toFixed(2)}`;
                document.getElementById('product-description').textContent = product.description;

                const stockEl = document.getElementById('product-stock');
                const btn = document.getElementById('add-to-cart-btn');
                const qtyContainer = document.getElementById('qty-container');
                const qtySelect = document.getElementById('product-qty');

                if (product.stock > 0) {
                    stockEl.textContent = 'In Stock';
                    stockEl.style.color = 'var(--success)';
                    btn.disabled = false;
                    qtyContainer.style.display = 'flex';

                    const maxQty = Math.min(product.stock, 10);
                    for (let i = 1; i <= maxQty; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = i;
                        qtySelect.appendChild(option);
                    }
                } else {
                    stockEl.textContent = 'Out of Stock';
                    stockEl.style.color = 'var(--danger)';
                    btn.textContent = 'Out of Stock';
                }

                btn.addEventListener('click', () => {
                    const qty = parseInt(qtySelect.value);
                    CartManager.addToCart(currentProduct, qty);
                    showToast('Product added to cart');
                });

            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                showToast('Product not found', 'error');
            }
        });
    </script>
</body>
</html>
