<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> ShopLogo
            </a>
        </div>
    </nav>

    <main class="container">
        <div class="card auth-container">
            <div style="padding: 2rem;">
                <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        Login <i class="fas fa-sign-in-alt"></i>
                    </button>
                </form>
                <div style="text-align: center; margin-top: 1.5rem; color: var(--gray-600);">
                    New Customer? <a href="register.html" style="color: var(--primary); font-weight: 500;">Register here</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (AuthManager.getUser()) {
                window.location.href = 'index.html'; // Redirect if already logged in
            }

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const btn = e.target.querySelector('button');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                btn.disabled = true;

                try {
                    const data = await ApiService.login(email, password);
                    AuthManager.setUser(data);
                    showToast('Login successful!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } catch (error) {
                    showToast(error.message, 'error');
                    btn.innerHTML = 'Login <i class="fas fa-sign-in-alt"></i>';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
