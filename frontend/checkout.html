<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> ShopLogo
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="cart.html" class="nav-link">Cart</a>
            </div>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container" style="padding: 3rem 1.5rem;">
        
        <div class="cart-layout">
            <!-- Shipping Form -->
            <div>
                <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                    <h2 style="margin-bottom: 1.5rem;">Shipping Address</h2>
                    <form id="shipping-form">
                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <input type="text" id="address" class="form-control" required>
                        </div>
                        <div class="grid grid-cols-2" style="gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">City</label>
                                <input type="text" id="city" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Postal Code</label>
                                <input type="text" id="postalCode" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <input type="text" id="country" class="form-control" required>
                        </div>
                    </form>
                </div>

                <div class="card" style="padding: 2rem;">
                    <h2 style="margin-bottom: 1.5rem;">Payment Method</h2>
                    <div style="padding: 1rem; border: 1px solid var(--primary); border-radius: var(--radius-md); background-color: rgba(79,70,229,0.05);">
                        <i class="fas fa-check-circle" style="color: var(--primary);"></i> Static Payment (Mock for Internship Project)
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div>
                <div class="card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200);">Order Summary</h3>
                    
                    <div id="checkout-items" style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--gray-200);">
                        <!-- Items injected here -->
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--gray-600);">
                        <span>Items:</span>
                        <span id="items-price">$0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--gray-600);">
                        <span>Shipping:</span>
                        <span>$0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: var(--gray-600);">
                        <span>Tax (15%):</span>
                        <span id="tax-price">$0.00</span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-weight: 700; font-size: 1.25rem;">
                        <span>Total:</span>
                        <span id="total-price">$0.00</span>
                    </div>

                    <button id="place-order-btn" class="btn btn-primary btn-block btn-lg">Place Order</button>
                </div>
            </div>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = AuthManager.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            AuthManager.updateNavLinks();

            const cart = CartManager.getCart();
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            // Pre-fill if address info exists in user profile
            if (user.address) {
                document.getElementById('address').value = user.address;
            }

            renderOrderSummary(cart);

            document.getElementById('place-order-btn').addEventListener('click', async () => {
                const address = document.getElementById('address').value;
                const city = document.getElementById('city').value;
                const postalCode = document.getElementById('postalCode').value;
                const country = document.getElementById('country').value;

                if (!address || !city || !postalCode || !country) {
                    showToast('Please fill in all shipping fields', 'error');
                    return;
                }

                const itemsPrice = cart.reduce((acc, item) => acc + item.price * item.qty, 0);
                const taxPrice = Number((0.15 * itemsPrice).toFixed(2));
                const totalPrice = itemsPrice + taxPrice;

                const orderData = {
                    orderItems: cart,
                    shippingAddress: { address, city, postalCode, country },
                    paymentMethod: 'Static Payment',
                    itemsPrice,
                    taxPrice,
                    totalPrice
                };

                const btn = document.getElementById('place-order-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                btn.disabled = true;

                try {
                    const createdOrder = await ApiService.createOrder(orderData);
                    CartManager.clearCart();
                    
                    showToast('Order placed successfully!');
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1500);

                } catch (error) {
                    showToast(error.message, 'error');
                    btn.innerHTML = 'Place Order';
                    btn.disabled = false;
                }
            });
        });

        function renderOrderSummary(cart) {
            const itemsContainer = document.getElementById('checkout-items');
            
            let itemsHtml = '';
            let itemsPrice = 0;

            cart.forEach(item => {
                itemsPrice += item.price * item.qty;
                itemsHtml += `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-size: 0.875rem;">
                        <span style="flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 1rem;">
                            ${item.qty} x ${item.name}
                        </span>
                        <span style="font-weight: 500;">$${(item.qty * item.price).toFixed(2)}</span>
                    </div>
                `;
            });

            const taxPrice = 0.15 * itemsPrice;
            const totalPrice = itemsPrice + taxPrice;

            itemsContainer.innerHTML = itemsHtml;
            document.getElementById('items-price').textContent = `$${itemsPrice.toFixed(2)}`;
            document.getElementById('tax-price').textContent = `$${taxPrice.toFixed(2)}`;
            document.getElementById('total-price').textContent = `$${totalPrice.toFixed(2)}`;
        }
    </script>
</body>
</html>
