<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> ShopLogo
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="cart.html" class="nav-link">Cart</a>
            </div>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container" style="padding: 3rem 1.5rem;">
        
        <div class="dashboard-layout">
            <!-- Sidebar -->
            <aside class="sidebar-nav">
                <h3 style="margin-bottom: 1.5rem;">My Account</h3>
                <a href="#" class="sidebar-link active" onclick="showTab('profile')">Profile Details</a>
                <a href="#" class="sidebar-link" onclick="showTab('orders')">Order History</a>
            </aside>

            <!-- Main Content -->
            <section>
                <!-- Profile Tab -->
                <div id="profile-tab">
                    <h2 style="margin-bottom: 1.5rem;">Update Profile</h2>
                    <div class="card" style="padding: 2rem;">
                        <form id="profile-form">
                            <div class="form-group">
                                <label class="form-label">Name</label>
                                <input type="text" id="name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone</label>
                                <input type="text" id="phone" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Address</label>
                                <input type="text" id="address" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password (leave blank to keep current)</label>
                                <input type="password" id="password" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>

                <!-- Orders Tab -->
                <div id="orders-tab" style="display: none;">
                    <h2 style="margin-bottom: 1.5rem;">Order History</h2>
                    <div class="card table-responsive">
                        <table id="orders-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>DATE</th>
                                    <th>TOTAL</th>
                                    <th>STATUS</th>
                                    <th>ACTION</th>
                                </tr>
                            </thead>
                            <tbody id="orders-body">
                                <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!AuthManager.getUser()) {
                window.location.href = 'login.html';
                return;
            }
            AuthManager.updateNavLinks();
            
            // Load Profile Data
            try {
                const profile = await ApiService.getProfile();
                document.getElementById('name').value = profile.name;
                document.getElementById('email').value = profile.email;
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('address').value = profile.address || '';
            } catch (error) {
                showToast('Failed to load profile', 'error');
            }

            // Update Profile Form
            document.getElementById('profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const address = document.getElementById('address').value;
                const password = document.getElementById('password').value;

                const dataToUpdate = { name, email, phone, address };
                if (password) dataToUpdate.password = password;

                const btn = e.target.querySelector('button');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
                btn.disabled = true;

                try {
                    const updatedUser = await ApiService.updateProfile(dataToUpdate);
                    AuthManager.setUser(updatedUser);
                    AuthManager.updateNavLinks();
                    showToast('Profile updated successfully!');
                    document.getElementById('password').value = ''; // clear
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    btn.innerHTML = 'Update Profile';
                    btn.disabled = false;
                }
            });

            // Load Orders
            loadOrders();
        });

        function showTab(tabName) {
            document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
            event.target.classList.add('active');

            if (tabName === 'profile') {
                document.getElementById('profile-tab').style.display = 'block';
                document.getElementById('orders-tab').style.display = 'none';
            } else {
                document.getElementById('profile-tab').style.display = 'none';
                document.getElementById('orders-tab').style.display = 'block';
            }
        }

        async function loadOrders() {
            const tbody = document.getElementById('orders-body');
            try {
                const orders = await ApiService.getMyOrders();
                
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No orders found</td></tr>';
                    return;
                }

                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>${order._id.substring(0, 8)}...</td>
                        <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                        <td>$${order.totalPrice.toFixed(2)}</td>
                        <td>
                            <span class="badge badge-${order.status === 'Delivered' ? 'success' : order.status === 'Cancelled' ? 'danger' : 'warning'}">
                                ${order.status}
                            </span>
                        </td>
                        <td>
                            ${order.status === 'Pending' ? `<button onclick="cancelOrder('${order._id}')" class="btn btn-danger btn-sm">Cancel</button>` : '-'}
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Failed to load orders</td></tr>';
            }
        }

        async function cancelOrder(id) {
            if(confirm('Are you sure you want to cancel this order?')) {
                try {
                    await ApiService.cancelOrder(id);
                    showToast('Order cancelled');
                    loadOrders();
                } catch (error) {
                    showToast(error.message, 'error');
                }
            }
        }
    </script>
</body>
</html>
